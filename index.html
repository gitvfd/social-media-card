<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Banner Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:wdth,wght@87.5,100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 1rem;
        box-sizing: border-box;
      }
      #app-container {
        background: #ffffff;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
        text-align: center;
      }
      h1 {
        color: #111;
        margin-bottom: 2rem;
      }
      .control-group {
        margin-bottom: 1.5rem;
        text-align: left;
      }
      .inline-label {
        display: inline-block;
        vertical-align: middle;
      }
      input[type="checkbox"] {
        width: auto;
        margin-right: 8px;
        vertical-align: middle;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }
      .annotation {
        font-weight: 300;
        font-size: 0.8rem;
        color: #555;
      }
      table {
        margin-top: 5px;
        border-collapse: collapse;
      }
      th,
      td {
        border: 0.5px solid #555;
        padding: 2px 4px;
        text-align: center;
      }
      th {
        background-color: #ffff;
        font-weight: bold;
      }
      tr:nth-child(even) {
        background-color: #fff;
      }

      input[type="text"],
      input[type="file"],
      select {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        font-size: 1rem;
        background-color: white;
      }
      input[type="text"] {
        font-family: "Noto Sans Display", sans-serif;
      }
      button {
        background-color: #0073b0;
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s;
        width: 100%;
      }
      button:hover {
        background-color: #005a8c;
      }
      #result-container {
        margin-top: 2rem;
      }
      #image-canvas {
        max-width: 100%;
        border-radius: 8px;
        border: 1px solid #eee;
      }
      #download-link {
        display: none;
        margin-top: 1rem;
        background-color: #28a745;
        color: white;
        padding: 0.8rem 1.5rem;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.3s;
      }
      #download-link:hover {
        background-color: #218838;
      }
      #custom-color-controls {
        display: none;
        margin-top: 0.75rem;
        flex-direction: column;
        gap: 0.6rem;
      }
      .color-input-row {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      .color-input-group {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex: 1;
      }
      .color-input-group label {
        margin-bottom: 0;
        font-weight: 400;
        font-size: 0.9rem;
        white-space: nowrap;
      }
      input[type="color"] {
        width: 40px;
        height: 36px;
        padding: 2px;
        border: 1px solid #ccc;
        border-radius: 6px;
        cursor: pointer;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="app-container">
      <h1>OECD social media chart banner Generator</h1>

      <div class="control-group">
        <input type="checkbox" id="add-top-banner-checkbox" />
        <label for="add-top-banner-checkbox" class="inline-label"
          >Add top banner with title/subtitle</label
        >
      </div>

      <div id="top-banner-controls" style="display: none">
        <div class="control-group">
          <label for="title-input"
            >Title
            <span class="annotation"
              >Use *...* to mark text for color, e.g., Title with *colored*
              text. Press Enter for new line.</span
            ></label
          >
          <textarea
            id="title-input"
            rows="3"
            placeholder="e.g., Chart of the Week\nSecond Line"
            style="
              width: 100%;
              padding: 0.75rem;
              border: 1px solid #ccc;
              border-radius: 6px;
              box-sizing: border-box;
              font-size: 1rem;
              font-family: &quot;Noto Sans Display&quot;, sans-serif;
            "
          ></textarea>
        </div>
        <div class="control-group">
          <label for="subtitle-input"
            >Subtitle
            <span class="annotation">Press Enter for new line.</span></label
          >
          <textarea
            id="subtitle-input"
            rows="2"
            placeholder="e.g., September 2025\nSource: OECD Data"
            style="
              width: 100%;
              padding: 0.75rem;
              border: 1px solid #ccc;
              border-radius: 6px;
              box-sizing: border-box;
              font-size: 1rem;
              font-family: &quot;Noto Sans Display&quot;, sans-serif;
            "
          ></textarea>
        </div>
        <div class="control-group">
          <label for="title-input"
            ><i>Recommended image size according to number of lines</i>
            <span class="annotation">
              <table>
                <thead>
                  <tr>
                    <th>Title - # of lines</th>
                    <th>Subtitle - # of lines</th>
                    <th>Width</th>
                    <th>Height</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>0</td>
                    <td>0</td>
                    <td>600 px</td>
                    <td>700 px</td>
                  </tr>
                  <tr>
                    <td>1</td>
                    <td>0</td>
                    <td>600 px</td>
                    <td>636 px</td>
                  </tr>
                  <tr>
                    <td>1</td>
                    <td>1</td>
                    <td>600 px</td>
                    <td>611 px</td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>0</td>
                    <td>600 px</td>
                    <td>601 px</td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>1</td>
                    <td>600 px</td>
                    <td>576 px</td>
                  </tr>
                  <tr>
                    <td>2</td>
                    <td>2</td>
                    <td>600 px</td>
                    <td>551 px</td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>0</td>
                    <td>600 px</td>
                    <td>566 px</td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>1</td>
                    <td>600 px</td>
                    <td>541 px</td>
                  </tr>
                  <tr>
                    <td>3</td>
                    <td>2</td>
                    <td>600 px</td>
                    <td>516 px</td>
                  </tr>
                </tbody>
              </table>
            </span></label
          >
        </div>
      </div>

      <div class="control-group">
        <label for="image-uploader"
          >1. Upload your image (PNG or SVG)
          <span class="annotation"
            ><br />
            Recommended size if no top banner added : Width: 600 px, Height: 700
            px;
          </span>
        </label>
        <input
          type="file"
          id="image-uploader"
          accept="image/png, image/svg+xml"
        />
      </div>

      <div class="control-group">
        <label for="text-input"
          >2. Enter your text (bottom banner)
          <span class="annotation">max ≈100 characters</span></label
        >
        <input
          type="text"
          id="text-input"
          placeholder="e.g., Interim Economic Outlook 2025 "
        />
      </div>

      <div class="control-group">
        <label for="color-picker">3. Pick a bottom banner color</label>
        <select id="color-picker">
          <option value="#101D40">Midnight</option>
          <option value="#E0F2FF">Light blue</option>
          <option value="#591C37">Plum</option>
          <option value="#3A0C12">Burgundy</option>
          <option value="#FFDDBD">Orange</option>
          <option value="#FFD15C">Yellow</option>
          <option value="#183F15">Forest Green</option>
          <option value="#F2FFE5">Grassy Green</option>
          <option value="#00292E">Turquoise</option>
          <option value="#001C37">Ocean</option>
          <option value="#D7EDFE">Sky</option>
          <option value="#3A062D">Berry</option>
          <option value="#FCEEFB">Lilac</option>
          <option value="custom">Custom…</option>
        </select>
        <div id="custom-color-controls">
          <div class="color-input-row">
            <div class="color-input-group">
              <label for="custom-footer-color">Footer</label>
              <input type="color" id="custom-footer-color" value="#101D40" />
              <label
                for="custom-gradient-toggle"
                style="
                  font-weight: 400;
                  font-size: 0.85rem;
                  margin-bottom: 0;
                  white-space: nowrap;
                "
                >Gradient</label
              >
              <input
                type="checkbox"
                id="custom-gradient-toggle"
                style="width: auto; margin: 0"
              />
              <input
                type="color"
                id="custom-footer-color-end"
                value="#0073b0"
                title="Gradient end color"
                style="display: none; width: 40px"
              />
            </div>
            <div class="color-input-group">
              <label for="custom-highlight-color">Highlight</label>
              <input type="color" id="custom-highlight-color" value="#156df9" />
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 0.5rem">
            <input
              type="checkbox"
              id="hashtag-source-toggle"
              style="width: auto; margin: 0"
            />
            <label
              for="hashtag-source-toggle"
              style="font-weight: 400; font-size: 0.9rem; margin-bottom: 0"
              >Hashtag source
              <span class="annotation">(larger footer text)</span></label
            >
          </div>
          <div>
            <label
              for="custom-logo-upload"
              style="
                font-weight: 400;
                font-size: 0.9rem;
                margin-bottom: 0.25rem;
              "
              >Right logo
              <span class="annotation">(PNG or SVG, optional)</span></label
            >
            <input
              type="file"
              id="custom-logo-upload"
              accept="image/png,image/svg+xml"
              style="padding: 0.3rem"
            />
          </div>
        </div>
      </div>
      <div class="control-group">
        <label for="lang-picker">4. Choose a language</label>
        <select id="lang-picker">
          <option value="en" selected>English</option>
          <option value="fr">French</option>
        </select>
      </div>
      <button id="generate-btn">Generate Image</button>

      <div id="result-container">
        <canvas id="image-canvas"></canvas>
        <a id="download-link" href="#">Download Image</a>
      </div>
    </div>

    <script>
      const imageUploader = document.getElementById("image-uploader");
      const textInput = document.getElementById("text-input");
      const colorPicker = document.getElementById("color-picker");
      const langPicker = document.getElementById("lang-picker");
      const generateBtn = document.getElementById("generate-btn");
      const canvas = document.getElementById("image-canvas");
      const ctx = canvas.getContext("2d");
      const downloadLink = document.getElementById("download-link");
      let lang;

      const addTopBannerCheckbox = document.getElementById(
        "add-top-banner-checkbox",
      );
      const topBannerControls = document.getElementById("top-banner-controls");
      const titleInput = document.getElementById("title-input"); // a textarea
      const subtitleInput = document.getElementById("subtitle-input"); // a textarea

      addTopBannerCheckbox.addEventListener("change", () => {
        topBannerControls.style.display = addTopBannerCheckbox.checked
          ? "block"
          : "none";
      });

      const customColorControls = document.getElementById(
        "custom-color-controls",
      );
      const customFooterColor = document.getElementById("custom-footer-color");
      const customHighlightColor = document.getElementById(
        "custom-highlight-color",
      );
      const customGradientToggle = document.getElementById(
        "custom-gradient-toggle",
      );
      const customFooterColorEnd = document.getElementById(
        "custom-footer-color-end",
      );
      const customLogoUpload = document.getElementById("custom-logo-upload");
      const hashtagSourceToggle = document.getElementById(
        "hashtag-source-toggle",
      );

      colorPicker.addEventListener("change", () => {
        customColorControls.style.display =
          colorPicker.value === "custom" ? "flex" : "none";
      });

      customGradientToggle.addEventListener("change", () => {
        customFooterColorEnd.style.display = customGradientToggle.checked
          ? "inline-block"
          : "none";
      });

      function isLightColor(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 128;
      }

      // Color mapping: banner color -> highlight color
      const highlightColorMap = {
        "#101D40": "#156df9", // Midnight -> Bright Blue
        "#E0F2FF": "#0D80F2", // Light blue -> Darker Blue
        "#591C37": "#ff667A", //Y Plum -> Pink
        "#3A0C12": "#ed6762d", //Y Burgundy -> Coral
        "#FFDDBD": "#b13b10", // Orange -> Dark Orange
        "#FFD15C": "#ba1212", //Y Yellow -> Dark Gold
        "#183F15": "#c1ef71", //Y Forest Green -> Light Green
        "#F2FFE5": "#3a8415", //Y Grassy Green -> Dark Green
        "#00292E": "#71e0d8", //Y Turquoise -> Dark Turquoise
        "#001C37": "#48a7ff", //Y Ocean -> Bright Cyan
        "#D7EDFE": "#1162d4", //Y Sky -> Darker Blue
        "#3A062D": "#ff75af", //Y Berry -> Pink
        "#FCEEFB": "#c63963", //Y Lilac -> Purple
      };

      generateBtn.addEventListener("click", () => {
        const file = imageUploader.files[0];
        const text = textInput.value;
        lang = langPicker.value;
        const color =
          colorPicker.value === "custom"
            ? customFooterColor.value
            : colorPicker.value;
        const colorEnd =
          colorPicker.value === "custom" && customGradientToggle.checked
            ? customFooterColorEnd.value
            : null;
        const customLogoSrc =
          colorPicker.value === "custom" && customLogoUpload.files[0]
            ? URL.createObjectURL(customLogoUpload.files[0])
            : null;
        const hashtagSource =
          colorPicker.value === "custom" && hashtagSourceToggle.checked;

        const addTopBanner = addTopBannerCheckbox.checked;
        const titleText = titleInput.value; // Get value from textarea
        const subtitleText = subtitleInput.value; // Get value from textarea
        // Get highlight color from mapping based on banner color
        const highlightColor =
          colorPicker.value === "custom"
            ? customHighlightColor.value
            : highlightColorMap[color] || "#156df9";

        if (!file) {
          alert("Please upload an image first.");
          return;
        }

        const originalFilename = file.name;
        const nameWithoutExtension =
          originalFilename.substring(0, originalFilename.lastIndexOf(".")) ||
          originalFilename;
        const newFilename = `${nameWithoutExtension}_SM.png`;

        const reader = new FileReader();
        reader.onload = (e) => {
          const userImage = new Image();
          userImage.onload = () => {
            document.fonts.ready
              .then(() => {
                createImage(
                  userImage,
                  text,
                  color,
                  newFilename,
                  false,
                  addTopBanner,
                  titleText,
                  subtitleText,
                  highlightColor,
                  colorEnd,
                  customLogoSrc,
                  hashtagSource,
                );
              })
              .catch((err) => {
                console.error("Font could not be loaded: ", err);
                alert(
                  "Could not load the custom font. Using Arial as a fallback.",
                );
                createImage(
                  userImage,
                  text,
                  color,
                  newFilename,
                  true,
                  addTopBanner,
                  titleText,
                  subtitleText,
                  highlightColor,
                  colorEnd,
                  customLogoSrc,
                  hashtagSource,
                );
              });
          };
          userImage.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });

      //  Helper function to calculate lines needed with multi-line wrapping
      function calculateWrappedLines(ctx, text, fontStyle, maxWidth) {
        let lineCount = 0;
        const manualLines = text.split("\n");

        ctx.save();
        ctx.font = fontStyle;
        ctx.fontStretch = "87.5%";

        manualLines.forEach((line) => {
          // Remove stars for width calculation if needed (only for title)
          const plainLine = fontStyle.includes("700")
            ? line.replace(/\*/g, "")
            : line;
          let remainingText = plainLine.trim();

          if (!remainingText) {
            // Handle empty manual lines
            lineCount++;
            return;
          }

          while (remainingText) {
            lineCount++; // Start a new line
            let currentLine = "";
            let words = remainingText.split(" ");
            let testLine = "";

            // Find the longest possible line that fits
            for (let i = 0; i < words.length; i++) {
              testLine = currentLine ? currentLine + " " + words[i] : words[i];
              if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                // The currentLine fits, but adding the next word doesn't
                break;
              } else {
                currentLine = testLine;
              }
            }

            // If even the first word doesn't fit, draw it on its own line
            if (!currentLine && words.length > 0) {
              currentLine = words[0];
            }

            // Remove the drawn portion from remainingText
            if (currentLine.length === remainingText.length) {
              remainingText = ""; // The whole rest fits
            } else {
              // Find the point where currentLine ends in remainingText
              // Need to handle potential multiple occurrences, find the first one
              let startIndex = remainingText.indexOf(currentLine);
              if (startIndex === 0) {
                // Should always start at 0
                remainingText = remainingText
                  .substring(currentLine.length)
                  .trim();
              } else {
                // Fallback: This shouldn't happen with the logic above, but be safe
                remainingText = remainingText.substring(words[0].length).trim();
              }
            }
          }
        });

        ctx.restore();
        return Math.max(1, lineCount); // Ensure at least 1 line is counted if text exists
      }

      //  drawStyledText now handles multi-line wrapping
      function drawStyledText(
        ctx,
        text,
        x,
        y,
        fontSize,
        lineHeight,
        fontFamily,
        defaultColor,
        highlightColor,
        maxWidth,
      ) {
        const manualLines = text.split("\n");
        let currentY = y;
        const startX = x;

        ctx.save();
        ctx.textBaseline = "top";

        manualLines.forEach((manualLine) => {
          let remainingText = manualLine.trim();
          let isBoldSection = false; // Track bold state across wrapped lines

          while (remainingText) {
            let currentLineText = ""; // The plain text of the line being built
            let currentLineParts = []; // The styled parts for this line
            let words = remainingText.split(/(\s+|\*)/).filter(Boolean); // Split by space or *, keeping delimiters
            let fits = true;

            // Build the current line word by word or part by part
            for (let i = 0; i < words.length; i++) {
              let part = words[i];
              let testLineText = currentLineText
                ? currentLineText + part
                : part;
              // Measure the plain text version
              ctx.font = `700 ${fontSize}px "${fontFamily}"`;
              ctx.fontStretch = "87.5%";
              let testWidth = ctx.measureText(
                testLineText.replace(/\*/g, ""),
              ).width;

              if (testWidth > maxWidth && currentLineText.length > 0) {
                // Current part makes the line too long, break here
                fits = false;
                remainingText = words.slice(i).join("").trim();
                break;
              } else {
                currentLineText += part;
                currentLineParts.push(part);
                // If it's the last word and everything fits
                if (i === words.length - 1) {
                  remainingText = "";
                }
              }
            }
            // Handle case where a single word/part is too long
            if (currentLineParts.length === 0 && words.length > 0) {
              currentLineParts.push(words[0]);
              remainingText = words.slice(1).join("").trim();
            }

            // Draw the constructed line
            let currentX = startX;
            currentLineParts.forEach((part) => {
              if (part === "*") {
                isBoldSection = !isBoldSection;
                return; // Don't draw the asterisk itself
              }
              if (/\s+/.test(part)) {
                // If it's whitespace
                ctx.font = `700 ${fontSize}px "${fontFamily}"`;
                ctx.fontStretch = "87.5%";
                currentX += ctx.measureText(part).width; // Advance X for spaces
                return;
              }

              ctx.fillStyle = isBoldSection ? highlightColor : defaultColor;
              ctx.font = `700 ${fontSize}px "${fontFamily}"`;
              ctx.fontStretch = "87.5%";
              ctx.fillText(part, currentX, currentY);
              currentX += ctx.measureText(part).width;
            });
            currentY += lineHeight; // Move to the next line
          }
          if (!manualLine.trim()) {
            // Handle empty manual lines (just add line height)
            currentY += lineHeight;
          }
        });

        ctx.restore();
        return currentY;
      }

      function createImage(
        userImage,
        text,
        color,
        newFilename,
        useFallbackFont = false,
        addTopBanner = false,
        titleText = "",
        subtitleText = "",
        highlightColor = "#0073b0",
        colorEnd = null,
        customLogoSrc = null,
        hashtagSource = false,
      ) {
        const resolutionMultiplier = 1; //previously 2.5

        let bottomBannerHeight;
        let logoPadding;
        let textPadding;

        // Calculate padding based on image size
        if (userImage.width > 1000) {
          logoPadding = 100 * resolutionMultiplier;
          textPadding = 100 * resolutionMultiplier;
        } else {
          logoPadding = 50 * resolutionMultiplier;
          textPadding = 50 * resolutionMultiplier;
        }

        // Set bottom banner height to 0 if no text is provided, but keep side margins
        if (!text.trim()) {
          bottomBannerHeight = 0;
        } else {
          bottomBannerHeight =
            userImage.width > 1000
              ? 100 * resolutionMultiplier
              : 50 * resolutionMultiplier;
        }

        let topBannerHeight = 0;
        let titleSize;
        let subtitleSize;
        let topBannerPadding;
        let topBannerMargin;

        if (userImage.width > 1000) {
          titleSize = 60 * resolutionMultiplier;
          subtitleSize = 40 * resolutionMultiplier;
          topBannerPadding = logoPadding / 2;
          topBannerMargin = logoPadding / 4;
        } else {
          titleSize = 30 * resolutionMultiplier;
          subtitleSize = 20 * resolutionMultiplier;
          topBannerPadding = logoPadding / 2;
          topBannerMargin = logoPadding / 4;
        }

        //  Pre-calculate lines and banner height using the updated function
        let titleLines = 0;
        let subtitleLines = 0;
        let titleLineHeight = 0;
        let subtitleLineHeight = 0;
        const tempCanvasWidth = userImage.width * resolutionMultiplier;
        const tempMaxWidth = tempCanvasWidth - logoPadding * 2;

        if (addTopBanner && (titleText || subtitleText)) {
          if (titleText) {
            const titleFontStyle = useFallbackFont
              ? `700 ${titleSize}px Arial`
              : `700 ${titleSize}px "Noto Sans Display"`;
            titleLines = calculateWrappedLines(
              ctx,
              titleText,
              titleFontStyle,
              tempMaxWidth,
            );
            titleLineHeight = titleSize + 5 * resolutionMultiplier;
          }
          if (subtitleText) {
            const subtitleFontStyle = useFallbackFont
              ? `500 ${subtitleSize}px Arial`
              : `500 ${subtitleSize}px "Noto Sans Display"`;
            subtitleLines = calculateWrappedLines(
              ctx,
              subtitleText,
              subtitleFontStyle,
              tempMaxWidth,
            );
            subtitleLineHeight = subtitleSize + 5 * resolutionMultiplier;
          }

          // Measure actual font descent to handle cross-browser differences (Safari vs Chrome)
          let titleDescent = 10 * resolutionMultiplier; // fallback
          if (titleText) {
            ctx.save();
            ctx.font = useFallbackFont
              ? `700 ${titleSize}px Arial`
              : `700 ${titleSize}px "Noto Sans Display"`;
            ctx.fontStretch = "87.5%";
            const m = ctx.measureText("Qgjpqy");
            if (m.actualBoundingBoxDescent !== undefined) {
              titleDescent =
                m.actualBoundingBoxDescent + 5 * resolutionMultiplier;
            }
            ctx.restore();
          }

          topBannerHeight =
            topBannerMargin / 2 +
            titleLines * titleLineHeight +
            subtitleLines * subtitleLineHeight +
            topBannerMargin +
            titleDescent;
        }

        canvas.width = userImage.width * resolutionMultiplier;
        canvas.height =
          topBannerHeight +
          userImage.height * resolutionMultiplier +
          bottomBannerHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#FFFFFF";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (addTopBanner && topBannerHeight > 0) {
          const leftPadding = logoPadding;
          let currentY = topBannerPadding;
          const maxWidth = canvas.width - leftPadding * 2;

          if (titleText) {
            currentY = drawStyledText(
              ctx,
              titleText,
              leftPadding,
              currentY,
              titleSize,
              titleLineHeight, // Use calculated line height
              "Noto Sans Display",
              "#101D40",
              highlightColor,
              maxWidth,
            );
          }

          if (subtitleText) {
            ctx.fillStyle = "#101D3F";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";

            const manualSubtitleLines = subtitleText.split("\n");

            manualSubtitleLines.forEach((line) => {
              let remainingLine = line.trim();
              if (!remainingLine) {
                // Handle empty manual lines
                currentY += subtitleLineHeight;
                return;
              }

              while (remainingLine) {
                ctx.font = useFallbackFont // Reset font before measuring
                  ? `500 ${subtitleSize}px Arial`
                  : `500 ${subtitleSize}px "Noto Sans Display"`;
                ctx.fontStretch = "87.5%";

                let words = remainingLine.split(" ");
                let lineToDraw = "";
                let testLine = "";

                // Find the longest possible line that fits
                for (let i = 0; i < words.length; i++) {
                  testLine = lineToDraw
                    ? lineToDraw + " " + words[i]
                    : words[i];
                  if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                    break;
                  } else {
                    lineToDraw = testLine;
                  }
                }
                // Handle single long word
                if (!lineToDraw && words.length > 0) {
                  lineToDraw = words[0];
                }

                ctx.fillText(lineToDraw, leftPadding, currentY);
                currentY += subtitleLineHeight;

                // Update remainingLine
                if (lineToDraw.length === remainingLine.length) {
                  remainingLine = "";
                } else {
                  let startIndex = remainingLine.indexOf(lineToDraw);
                  if (startIndex === 0) {
                    remainingLine = remainingLine
                      .substring(lineToDraw.length)
                      .trim();
                  } else {
                    // Fallback if something weird happens
                    remainingLine = remainingLine
                      .substring(words[0].length)
                      .trim();
                  }
                }
              }
            });
          }
        }

        const imageY = topBannerHeight;
        ctx.drawImage(
          userImage,
          0,
          imageY,
          userImage.width * resolutionMultiplier,
          userImage.height * resolutionMultiplier,
        );

        const bottomBannerY =
          topBannerHeight + userImage.height * resolutionMultiplier;

        // Only draw bottom banner and logo if text is provided
        if (text.trim()) {
          if (colorEnd) {
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, colorEnd);
            ctx.fillStyle = gradient;
          } else {
            ctx.fillStyle = color;
          }
          ctx.fillRect(0, bottomBannerY, canvas.width, bottomBannerHeight);
        }

        if (text.trim()) {
          const loadImg = (src) =>
            new Promise((resolve, reject) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = reject;
              img.src = src;
            });

          let oecdLogoSrc = "";
          if (lang === "fr") {
            oecdLogoSrc = isLightColor(color)
              ? "logo/OCDE_logo_fr.svg"
              : "logo/OECD logo FR White no tagline.svg";
          } else {
            oecdLogoSrc = isLightColor(color)
              ? "logo/OECD_20cm_blue_notag.svg"
              : "logo/OECD logo EN White no tagline.svg";
          }

          Promise.all([
            loadImg(oecdLogoSrc),
            customLogoSrc ? loadImg(customLogoSrc) : Promise.resolve(null),
          ])
            .then(([oecdLogo, customLogo]) => {
              const logoMaxHeight =
                userImage.width > 1000
                  ? 50 * resolutionMultiplier
                  : 25 * resolutionMultiplier;

              // --- OECD logo (left) ---
              const logoHeight = logoMaxHeight;
              const logoWidth = logoHeight * (oecdLogo.width / oecdLogo.height);
              const logoY =
                bottomBannerY + (bottomBannerHeight - logoHeight) / 2;
              const logoX = logoPadding;
              ctx.drawImage(oecdLogo, logoX, logoY, logoWidth, logoHeight);

              // --- Custom logo (right) ---
              let customLogoWidth = 0;
              if (customLogo) {
                customLogoWidth =
                  logoHeight * (customLogo.width / customLogo.height);
                const customLogoX =
                  canvas.width - logoPadding - customLogoWidth;
                ctx.drawImage(
                  customLogo,
                  customLogoX,
                  logoY,
                  customLogoWidth,
                  logoHeight,
                );
              }

              // --- Banner text ---
              const fontSize =
                userImage.width > 1000
                  ? (hashtagSource ? 50 : 30) * resolutionMultiplier
                  : (hashtagSource ? 25 : 15) * resolutionMultiplier;
              const textColor = isLightColor(color) ? "#000000" : "#FFFFFF";
              ctx.fillStyle = textColor;
              ctx.font = useFallbackFont
                ? `${fontSize}px Arial`
                : `400 ${fontSize}px "Noto Sans Display"`;
              ctx.textAlign = "right";

              // Right boundary shifts left when a custom logo is present
              const textRightX = customLogo
                ? canvas.width -
                  logoPadding -
                  customLogoWidth -
                  20 * resolutionMultiplier
                : canvas.width - textPadding;

              const textMetrics = ctx.measureText(text);
              const logoRightX = logoX + logoWidth;
              const textLeftX = textRightX - textMetrics.width;

              if (textLeftX < logoRightX + 40 * resolutionMultiplier) {
                ctx.textBaseline = "top";
                const lineHeight =
                  userImage.width > 1000
                    ? 35 * resolutionMultiplier
                    : 18 * resolutionMultiplier;
                const blockHeight = lineHeight * 2;
                const topPaddingForBlock =
                  (bottomBannerHeight - blockHeight) / 2;
                const textY1 = bottomBannerY + topPaddingForBlock;

                let line1 = "",
                  line2 = "";
                const middle = Math.floor(text.length / 2);
                const splitPoint = text.lastIndexOf(" ", middle);
                if (splitPoint !== -1) {
                  line1 = text.substring(0, splitPoint);
                  line2 = text.substring(splitPoint + 1);
                } else {
                  line1 = text;
                }

                ctx.fillText(line1, textRightX, textY1);
                if (line2) {
                  ctx.fillText(line2, textRightX, textY1 + lineHeight);
                }
              } else {
                ctx.textBaseline = "middle";
                const textY = bottomBannerY + bottomBannerHeight / 2;
                ctx.fillText(text, textRightX, textY);
              }

              downloadLink.download = newFilename;
              downloadLink.href = canvas.toDataURL("image/png");
              downloadLink.style.display = "inline-block";
            })
            .catch(() => {
              alert("Error: Could not load one or more logos.");
            });
        } else {
          // If no text, just show the download link
          downloadLink.download = newFilename;
          downloadLink.href = canvas.toDataURL("image/png");
          downloadLink.style.display = "inline-block";
        }
      }
    </script>
  </body>
</html>
